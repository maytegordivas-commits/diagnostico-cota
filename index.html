<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Financiero | Método COTA</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-200 min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl p-6">

<!-- HEADER -->
<div class="text-center mb-6">
<h1 class="text-2xl font-bold">💰 Finanzas Simples</h1>
<p class="text-gray-500 text-sm">Diagnóstico gratuito - Método COTA</p>
</div>

<form id="formCOTA">

<!-- PASO 1 -->
<section id="step0">
<h2 class="font-semibold text-lg mb-4">Cuéntame de ti 👇</h2>

<input type="text" id="userName" placeholder="Tu nombre" class="border rounded-xl p-3 w-full mb-3 focus:outline-none focus:ring-2 focus:ring-black" required>

<input type="email" id="userEmail" placeholder="Tu correo" class="border rounded-xl p-3 w-full mb-3 focus:outline-none focus:ring-2 focus:ring-black" required>

<input type="tel" id="userPhone" placeholder="Tu WhatsApp" class="border rounded-xl p-3 w-full mb-5 focus:outline-none focus:ring-2 focus:ring-black" required>

<button type="button" onclick="nextStep()" class="bg-black text-white w-full py-3 rounded-xl hover:opacity-90 transition">
Continuar →
</button>
</section>

<!-- PASO 2 -->
<section id="step1" style="display:none;">
<h2 class="font-semibold text-lg mb-4">Tu situación actual 💭</h2>

<textarea id="feeling" placeholder="Ej: Siento que gano pero no sé en qué se me va el dinero..." class="border rounded-xl p-3 w-full mb-5 h-28 focus:outline-none focus:ring-2 focus:ring-black"></textarea>

<div class="flex gap-3">
<button type="button" onclick="previousStep()" class="border w-1/2 py-3 rounded-xl">
← Atrás
</button>

<button type="button" onclick="nextStep()" class="bg-black text-white w-1/2 py-3 rounded-xl">
Continuar →
</button>
</div>
</section>

<!-- PASO 3 -->
<section id="step2" style="display:none;">
<h2 class="font-semibold text-lg mb-4">Listo 🚀</h2>

<p class="text-gray-500 text-sm mb-5">
Estás a un paso de entender mejor tu dinero sin complicarte.
</p>

<button type="button" onclick="enviar()" class="bg-green-600 text-white w-full py-3 rounded-xl hover:opacity-90 transition">
Enviar diagnóstico
</button>
</section>

</form>

</div>

<script>
let currentStep = 0;

function nextStep(){
document.getElementById("step"+currentStep).style.display="none";
currentStep++;
document.getElementById("step"+currentStep).style.display="block";
}

function previousStep(){
document.getElementById("step"+currentStep).style.display="none";
currentStep--;
document.getElementById("step"+currentStep).style.display="block";
}

async function enviar(){

const nombre = document.getElementById("userName").value;
const email = document.getElementById("userEmail").value;
const telefono = document.getElementById("userPhone").value;
const feeling = document.getElementById("feeling").value;

const formData = new FormData();

formData.append("Nombre", nombre);
formData.append("Email", email);
formData.append("WhatsApp", telefono);
formData.append("Situación", feeling);
formData.append("_subject", "Nuevo Diagnóstico Método COTA");
formData.append("_replyto", email);

try {
const response = await fetch("https://formspree.io/f/xeepznwo", {
method: "POST",
body: formData,
headers: { "Accept": "application/json" }
});

if(response.ok){
mostrarExito(nombre);
}else{
alert("Error al enviar");
}

} catch(error){
alert("Error de conexión");
}
}

function mostrarExito(nombre){
document.body.innerHTML = `
<div class="flex items-center justify-center min-h-screen bg-white p-6 text-center">
<div class="max-w-md">

<h1 class="text-2xl font-bold mb-3">✨ ¡Listo ${nombre}!</h1>

<p class="text-gray-600 mb-6">
Ya recibí tu diagnóstico. Si quieres que lo veamos juntas y te ayude a ordenarte sin complicarte 👇
</p>

<a href="https://wa.me/523330257643?text=Hola%20Mayte,%20ya%20hice%20mi%20diagnóstico%20y%20quiero%20mi%20asesoría"
class="bg-green-500 text-white px-6 py-3 rounded-xl inline-block">
Escribirme por WhatsApp
</a>

</div>
</div>
`;
}
</script>

</body>
</html>
