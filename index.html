<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Simples - Método COTA</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<form id="formCOTA">

<!-- PASO 0 -->
<section id="step0">
<h2>Datos</h2>

<input type="text" id="userName" name="Nombre" placeholder="Nombre" required>
<input type="email" id="userEmail" name="email" placeholder="Correo" required>
<input type="tel" id="userPhone" name="WhatsApp" placeholder="WhatsApp" required>

<button type="button" onclick="nextStep()">Continuar</button>
</section>

<!-- PASO 1 -->
<section id="step1" style="display:none;">
<h2>Sentimiento</h2>

<textarea id="feeling" placeholder="¿Cómo te sientes?"></textarea>

<button type="button" onclick="previousStep()">Atrás</button>
<button type="button" onclick="nextStep()">Continuar</button>
</section>

<!-- PASO FINAL -->
<section id="step2" style="display:none;">
<h2>Final</h2>

<button type="button" onclick="enviar()">Enviar Diagnóstico</button>
</section>

</form>

<script>
let currentStep = 0;

function nextStep(){
document.getElementById("step"+currentStep).style.display="none";
currentStep++;
document.getElementById("step"+currentStep).style.display="block";
}

function previousStep(){
document.getElementById("step"+currentStep).style.display="none";
currentStep--;
document.getElementById("step"+currentStep).style.display="block";
}

async function enviar(){

const data = {
nombre: document.getElementById("userName").value,
email: document.getElementById("userEmail").value,
telefono: document.getElementById("userPhone").value,
feeling: document.getElementById("feeling").value
};

const formData = new FormData();

formData.append("Nombre", data.nombre);
formData.append("Email", data.email);
formData.append("WhatsApp", data.telefono);
formData.append("Sentimiento", data.feeling);
formData.append("_subject", "Nuevo Diagnóstico COTA");
formData.append("_replyto", data.email);

try{
const response = await fetch("https://formspree.io/f/xeepznwo", {
method:"POST",
body:formData,
headers:{ "Accept":"application/json" }
});

if(response.ok){
alert("¡Listo! Diagnóstico enviado");
mostrarExito();
}else{
alert("Error al enviar");
}

}catch(error){
alert("Error de conexión");
}
}

function mostrarExito(){
document.body.innerHTML = `
<h1>🎉 Listo Mayte</h1>
<p>Ya tienes un nuevo lead en tu correo</p>

<a href="https://wa.me/523330257643?text=Hola%20Mayte,%20ya%20hice%20mi%20diagnóstico">
Ir a WhatsApp
</a>
`;
}
</script>

</body>
</html>
