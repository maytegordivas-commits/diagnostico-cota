<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Finanzas Simples | Método COTA por Mayte Gaby</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="bg-white w-full max-w-2xl rounded-2xl shadow-xl p-6">

<!-- HEADER -->
<div class="text-center mb-6">
<h1 class="text-2xl font-bold">💰 Finanzas Simples</h1>
<p class="text-gray-500 text-sm">Diagnóstico completo - Método COTA</p>

<div class="w-full bg-gray-200 rounded-full h-2 mt-4">
<div id="progressBar" class="bg-black h-2 rounded-full" style="width:5%"></div>
</div>
</div>

<form id="formCOTA">

<!-- PASO 0 -->
<section id="step0">
<h2 class="mb-4 font-semibold">Datos básicos</h2>
<input id="name" placeholder="Nombre" class="input">
<input id="email" placeholder="Correo" class="input">
<input id="phone" placeholder="WhatsApp" class="input">
<button type="button" onclick="next()">Continuar</button>
</section>

<!-- PASO 1 -->
<section id="step1" class="hidden">
<h2>¿Cómo te sientes?</h2>
<select id="feeling" class="input">
<option>Tranquila</option>
<option>Estresada</option>
<option>Confundida</option>
<option>Endeudada</option>
</select>
<button type="button" onclick="prev()">Atrás</button>
<button type="button" onclick="next()">Continuar</button>
</section>

<!-- PASO 2 -->
<section id="step2" class="hidden">
<h2>¿Tienes control de gastos?</h2>
<select id="control" class="input">
<option>Sí</option>
<option>No</option>
<option>Más o menos</option>
</select>
<button onclick="prev()" type="button">Atrás</button>
<button onclick="next()" type="button">Continuar</button>
</section>

<!-- PASO 3 -->
<section id="step3" class="hidden">
<h2>¿Ahorras?</h2>
<select id="ahorro" class="input">
<option>Sí</option>
<option>No</option>
<option>A veces</option>
</select>
<button onclick="prev()" type="button">Atrás</button>
<button onclick="next()" type="button">Continuar</button>
</section>

<!-- PASO 4 -->
<section id="step4" class="hidden">
<h2>Deudas</h2>
<select id="deuda" class="input">
<option>No tengo</option>
<option>Pocas</option>
<option>Muchas</option>
</select>
<button onclick="prev()" type="button">Atrás</button>
<button onclick="next()" type="button">Continuar</button>
</section>

<!-- PASO 5 -->
<section id="step5" class="hidden">
<h2>Meta financiera</h2>
<input id="goal" class="input" placeholder="¿Qué quieres lograr?">
<button onclick="prev()" type="button">Atrás</button>
<button onclick="next()" type="button">Continuar</button>
</section>

<!-- PASO FINAL -->
<section id="step6" class="hidden text-center">
<h2>Final</h2>
<button type="button" onclick="send()">Enviar diagnóstico</button>
</section>

</form>

</div>

<style>
.input{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:10px;}
button{background:black;color:white;padding:10px;border-radius:10px;width:100%;margin-top:10px;}
.hidden{display:none;}
</style>

<script>
let step=0;
const totalSteps=7;

function updateBar(){
document.getElementById("progressBar").style.width=((step+1)/totalSteps*100)+"%";
}

function next(){
document.getElementById("step"+step).classList.add("hidden");
step++;
document.getElementById("step"+step).classList.remove("hidden");
updateBar();
}

function prev(){
document.getElementById("step"+step).classList.add("hidden");
step--;
document.getElementById("step"+step).classList.remove("hidden");
updateBar();
}

async function send(){

const data=new FormData();
data.append("Nombre",document.getElementById("name").value);
data.append("Email",document.getElementById("email").value);
data.append("WhatsApp",document.getElementById("phone").value);
data.append("Sentimiento",document.getElementById("feeling").value);
data.append("Control",document.getElementById("control").value);
data.append("Ahorro",document.getElementById("ahorro").value);
data.append("Deuda",document.getElementById("deuda").value);
data.append("Meta",document.getElementById("goal").value);

try{
let res=await fetch("https://formspree.io/f/xeepznwo",{
method:"POST",
body:data,
headers:{"Accept":"application/json"}
});

if(res.ok){
document.body.innerHTML=`<h1>🎉 Enviado</h1>
<a href="https://wa.me/523330257643?text=Hola Mayte ya hice mi diagnóstico">WhatsApp</a>`;
}else{alert("Error");}

}catch(e){alert("Error conexión");}
}
</script>

</body>
</html>
